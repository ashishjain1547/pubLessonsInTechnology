<style>
  :root {
    --bg: #f2f3f5;
    --panel: #e0e2e5;
    --muted: #9aa0a6;
    --accent: #6b7280;
    --card: #ffffff;
    --shadow: rgba(16, 24, 40, 0.05);
  }

  div.container * {
    box-sizing: border-box;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }

  div.container {
    margin: auto;
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    background: linear-gradient(180deg, var(--bg), #eceef0);
    color: #1f2937;
    min-height: 100vh;
    padding: 28px;
  }

  div.container .panel {
    background: var(--panel);
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 6px 18px var(--shadow);
  }

  /* Left column */
  div.container .inputs {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 56px);
    min-height: 520px;
    gap: 12px;
  }

  div.container .fields {
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: auto;
    padding-right: 6px;
  }

  div.container label {
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 6px;
    display: block;
  }

  div.container input[type="text"],
  div.container input[type="number"],
  div.container select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid rgba(31, 41, 55, 0.06);
    background: var(--card);
    font-size: 14px;
    color: #0f1724;
  }

  div.container input[type="number"]::-webkit-outer-spin-button,
  div.container input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  div.container .hint {
    font-size: 12px;
    color: var(--muted);
  }

  div.container .left-bottom {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  div.container button.generate {
    background: #374151;
    color: white;
    border: 0;
    padding: 12px 14px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 12px rgba(55, 65, 81, 0.12);
  }

  div.container button.generate:hover {
    filter: brightness(1.02)
  }

  div.container .small {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
  }

  /* Right column (output) */
  div.container .output {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 520px;
    height: calc(100vh - 56px);
  }

  div.container .card {
    background: var(--card);
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
    overflow: auto;
  }

  div.container .title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  div.container .title h2 {
    margin: 0;
    font-size: 18px;
  }

  div.container .meta {
    font-size: 13px;
    color: var(--muted);
  }

  div.container .routine {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  div.container .session {
    border-radius: 8px;
    background: linear-gradient(180deg, #f8fafc, #ffffff);
    padding: 12px;
    border: 1px solid rgba(31, 41, 55, 0.04);
  }

  div.container .session h3 {
    margin: 0;
    font-size: 15px;
    color: #111827;
  }

  div.container .session .items {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 14px;
    color: #0f1724;
  }

  div.container .ex {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  div.container .ex .name {
    font-weight: 600;
  }

  div.container .ex .meta {
    font-size: 13px;
    color: var(--muted);
    min-width: 90px;
    text-align: right
  }

  div.container .tips {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    border-top: 1px dashed rgba(15, 23, 42, 0.04);
    padding-top: 10px;
  }

  div.container .controls {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }

  div.container .btn-ghost {
    background: transparent;
    border: 1px solid rgba(15, 23, 42, 0.06);
    padding: 8px 10px;
    border-radius: 8px;
    color: var(--accent);
    cursor: pointer;
  }

  /* Responsive */
  @media (max-width:880px) {
    div.container {
      grid-template-columns: 1fr;
      padding: 0 8px;
    }

    div.container .inputs {
      height: auto;
      min-height: 0
    }

    div.container .output {
      height: auto;
      min-height: 0
    }
  }
</style>
<div class="container" role="main">
  <aside class="panel inputs" aria-label="Inputs">
    <div class="fields">
      <div>
        <label for="muscle">Muscle or body part</label>
        <input id="muscle" type="text" placeholder="e.g., legs, chest, full body, core, upper body" value="Full body" />
      </div>
      <div>
        <label for="equipment">Equipment</label>
        <input id="equipment" type="text" placeholder="e.g., none, dumbbells, kettlebell, barbell, bands"
          value="None" />
        <div class="hint" style="margin-top:6px">Comma-separated allowed. Use "none" for bodyweight.</div>
      </div>
      <div>
        <label for="hours">Min hours per week</label>
        <input id="hours" type="number" min="0.25" step="0.25" value="2" />
        <div class="hint" style="margin-top:6px">Enter minimum hours you can commit per week (e.g., 1.5)</div>
      </div>
      <div style="margin-top:6px;">
        <label>Quick presets</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-ghost" type="button" data-preset="Full body|None|2">Full • Bodyweight</button>
          <button class="btn-ghost" type="button" data-preset="Legs|Dumbbells|2.5">Legs • DB</button>
          <button class="btn-ghost" type="button" data-preset="Upper body|Dumbbells|1.5">Upper • DB</button>
          <button class="btn-ghost" type="button" data-preset="Core|None|1">Core • BW</button>
        </div>
      </div>
    </div>

    <div class="left-bottom">
      <div class="small"><span>Preview & generate a simple, practical routine</span><span
          style="font-weight:700;color:var(--accent)">Grey theme</span></div>
      <button class="generate" id="genBtn">Generate Routine</button>
    </div>
  </aside>

  <section class="panel output" aria-label="Exercise Routine">
    <div class="card" id="outputCard">
      <div class="title">
        <div
          style="width:44px;height:44px;border-radius:8px;background:linear-gradient(180deg,#e6e7ea,#f7f8fa);display:flex;align-items:center;justify-content:center;border:1px solid rgba(15,23,42,0.03)">
          <!-- simple dumbbell svg -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden>
            <path d="M3 10h2v4H3zM19 10h2v4h-2z" fill="#6b7280" />
            <path d="M7 9h10v6H7z" fill="#9ca3af" />
            <path d="M1 8h4v8H1zM19 6h4v12h-4z" fill="#d1d5db" />
          </svg>
        </div>
        <div>
          <h2>Exercise Routine</h2>
          <div class="meta" id="meta">Fill inputs and click "Generate Routine".</div>
        </div>
      </div>

      <div id="routineArea" class="routine" aria-live="polite">
        <!-- generated routine appears here -->
        <div style="color:var(--muted);">No routine generated yet.</div>
      </div>

      <div class="controls" style="margin-top:12px">
        <button class="btn-ghost" id="copyBtn">Copy as Text</button>
        <button class="btn-ghost" id="resetBtn">Reset Inputs</button>
      </div>
    </div>
  </section>
</div>

<script>
  (function () {
    // Utility helpers
    function $(id) { return document.getElementById(id); }
    function choose(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // Basic exercise database by target & equipment
    const DB = {
      'full body': {
        none: [
          { name: 'Push-ups', meta: '3 sets x 8-15 reps' },
          { name: 'Air Squats', meta: '3 sets x 12-20 reps' },
          { name: 'Plank', meta: '3 x 45-60 sec' },
          { name: 'Glute Bridges', meta: '3 sets x 12-15 reps' },
          { name: 'Walking Lunges', meta: '3 sets x 10-12 each leg' }
        ],
        dumbbells: [
          { name: 'Dumbbell Squat', meta: '4 x 8-12' },
          { name: 'Dumbbell Bench Press', meta: '3 x 8-12' },
          { name: 'One-arm Row', meta: '3 x 8-12 each' },
          { name: 'DB Romanian Deadlift', meta: '3 x 10-12' },
          { name: 'Plank', meta: '3 x 45-60s' }
        ]
      },
      legs: {
        none: [
          { name: 'Bodyweight Squats', meta: '4 x 12-18' },
          { name: 'Walking Lunges', meta: '3 x 12 each' },
          { name: 'Step-ups', meta: '3 x 10 each' },
          { name: 'Calf Raises', meta: '4 x 15-20' },
          { name: 'Wall Sit', meta: '3 x 45-60s' }
        ],
        dumbbells: [
          { name: 'Goblet Squat', meta: '4 x 8-12' },
          { name: 'Dumbbell Lunges', meta: '3 x 10 each' },
          { name: 'Romanian Deadlift', meta: '4 x 8-12' },
          { name: 'Calf Raises (DB)', meta: '4 x 12-15' },
          { name: 'Bulgarian Split Squat', meta: '3 x 8-10 each' }
        ]
      },
      chest: {
        none: [
          { name: 'Incline Push-ups', meta: '4 x 8-15' },
          { name: 'Diamond Push-ups', meta: '3 x 6-12' },
          { name: 'Chest Dips (bench)', meta: '3 x 8-12' },
          { name: 'Push-up hold', meta: '3 x 30-45s' }
        ],
        dumbbells: [
          { name: 'Dumbbell Bench Press', meta: '4 x 6-12' },
          { name: 'Incline DB Press', meta: '3 x 8-12' },
          { name: 'Dumbbell Flyes', meta: '3 x 10-15' },
          { name: 'Push-ups', meta: '3 x AMRAP' }
        ]
      },
      back: {
        none: [
          { name: 'Superman', meta: '3 x 10-15' },
          { name: 'Reverse Snow Angels', meta: '3 x 12-15' },
          { name: 'Prone Y/T Raises', meta: '3 sets' },
          { name: 'Inverted Row (table)', meta: '3 x 6-12' }
        ],
        dumbbells: [
          { name: 'One-arm DB Row', meta: '4 x 8-12' },
          { name: 'Bent-over DB Row', meta: '3 x 8-12' },
          { name: 'DB Deadlift', meta: '3 x 8-12' },
          { name: 'Pullovers', meta: '3 x 10-12' }
        ]
      },
      shoulders: {
        none: [
          { name: 'Pike Push-ups', meta: '4 x 6-12' },
          { name: 'Arm Circles', meta: '3 x 30s' },
          { name: 'Plank to Downward Dog', meta: '3 x 8-12' }
        ],
        dumbbells: [
          { name: 'DB Overhead Press', meta: '4 x 6-12' },
          { name: 'Lateral Raises', meta: '3 x 10-15' },
          { name: 'Front Raises', meta: '3 x 8-12' },
          { name: 'Rear Delt Flyes', meta: '3 x 10-15' }
        ]
      },
      arms: {
        none: [
          { name: 'Diamond Push-ups', meta: '3 x 6-12' },
          { name: 'Chair Dips', meta: '3 x 8-15' },
          { name: 'Bodyweight Curls (towel)', meta: '3 x 8-12' }
        ],
        dumbbells: [
          { name: 'Bicep Curls', meta: '4 x 8-12' },
          { name: 'Triceps Kickback', meta: '3 x 10-15' },
          { name: 'Hammer Curls', meta: '3 x 8-12' }
        ]
      },
      core: {
        none: [
          { name: 'Plank', meta: '3 x 45-90s' },
          { name: 'Hanging Knee Tucks (or lying)', meta: '3 x 12-15' },
          { name: 'Russian Twists', meta: '3 x 20 total' },
          { name: 'Leg Raises', meta: '3 x 10-15' }
        ],
        dumbbells: [
          { name: 'Weighted Russian Twist', meta: '3 x 20' },
          { name: 'Dumbbell Side Bend', meta: '3 x 12 each' },
          { name: 'Weighted Sit-ups', meta: '3 x 10-15' }
        ]
      },
      cardio: {
        none: [
          { name: 'Jumping Jacks', meta: '5 x 60s' },
          { name: 'High Knees', meta: '5 x 40s' },
          { name: 'Burpees', meta: '5 x 12' }
        ],
        any: [
          { name: 'Rowing/Running/Bike', meta: '20-40 min steady or intervals' }
        ]
      }
    };

    // Elements
    const muscleEl = $('muscle');
    const equipEl = $('equipment');
    const hoursEl = $('hours');
    const genBtn = $('genBtn');
    const routineArea = $('routineArea');
    const metaEl = $('meta');
    const copyBtn = $('copyBtn');
    const resetBtn = $('resetBtn');
    const presetBtns = document.querySelectorAll('.btn-ghost[data-preset]');

    // Preset handler
    presetBtns.forEach(b => {
      b.addEventListener('click', () => {
        const [mus, e, h] = b.dataset.preset.split('|');
        muscleEl.value = mus;
        equipEl.value = e;
        hoursEl.value = h;
      });
    });

    // Normalize input helpers
    function normText(s) {
      return (s || '').trim().toLowerCase();
    }
    function detectEquipment(eStr) {
      const e = normText(eStr);
      const known = ['none', 'bodyweight', 'dumbbell', 'dumbbells', 'barbell', 'kettlebell', 'bands', 'band', 'machine', 'cable', 'any'];
      for (const k of known) {
        if (e.includes(k)) return k.replace(/s$/, ''); // return singular form mostly
      }
      // fallback: if contains comma, take first
      if (e) return e.split(',')[0].trim();
      return 'none';
    }
    function detectTarget(tStr) {
      const t = normText(tStr);
      const keys = Object.keys(DB);
      for (const key of keys) {
        if (t.includes(key)) return key;
      }
      // try mapping common words
      if (t.includes('upper')) return 'upper body';
      if (t.includes('lower') || t.includes('leg')) return 'legs';
      if (t.includes('back')) return 'back';
      if (t.includes('chest')) return 'chest';
      if (t.includes('shoulder')) return 'shoulders';
      if (t.includes('arm')) return 'arms';
      if (t.includes('core') || t.includes('abs')) return 'core';
      if (t.includes('cardio')) return 'cardio';
      if (t.includes('full') || t.includes('body')) return 'full body';
      // default
      return 'full body';
    }

    // Generate routine
    function generateRoutine() {
      const rawMus = muscleEl.value || 'Full body';
      const rawEquip = equipEl.value || 'none';
      const hours = Math.max(0.25, parseFloat(hoursEl.value) || 1);

      const equip = detectEquipment(rawEquip);
      let target = detectTarget(rawMus);

      // Special: 'upper body' fallback to 'full body' - our DB uses 'full body' and 'upper' not defined; map 'upper body' to a combination
      if (target === 'upper body' || target === 'upper') {
        // we'll create a custom upper-body list by merging chest/back/shoulders/arms
        target = 'upper';
      }

      // determine number of sessions
      const sessionHour = 1; // target per session (hrs)
      let sessions = Math.round(hours / sessionHour);
      if (sessions < 1) sessions = 1;
      if (sessions > 6) sessions = 6;

      // session distribution: if upper -> alternate chest/back/shoulders/arms
      const days = sessions;
      const plan = [];
      for (let i = 0; i < days; i++) {
        const dayName = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'][i % 7];
        plan.push({ day: dayName, exercises: [] });
      }

      // builder function to fetch exercises from DB
      function getExercisesFor(targetKey, equipmentKey) {
        if (targetKey === 'upper') {
          // merge chest/back/shoulders/arms pools
          const parts = ['chest', 'back', 'shoulders', 'arms'];
          let pool = [];
          parts.forEach(p => {
            const pDB = DB[p];
            if (!pDB) return;
            if (pDB[equipmentKey]) pool = pool.concat(pDB[equipmentKey]);
            else {
              // try any available
              const keys = Object.keys(pDB);
              pool = pool.concat(pDB[keys[0]]);
            }
          });
          return pool;
        }
        const entry = DB[targetKey] || DB['full body'];
        // prefer exact equipment if available, else any available key
        if (entry[equipmentKey]) return entry[equipmentKey];
        const keys = Object.keys(entry);
        // pick the first available list
        return entry[keys[0]];
      }

      // choose exercises for each session
      const pool = getExercisesFor(target, equip);
      for (let i = 0; i < plan.length; i++) {
        // warm-up
        const warm = { name: 'Warm-up (dynamic)', meta: '5-8 min: mobility & light cardio' };
        // pick 3-5 main exercises depending on session length
        const count = hours >= 2.5 ? 5 : (hours >= 1.5 ? 4 : 3);
        // shuffle pool and pick distinct
        const shuffled = pool.slice().sort(() => Math.random() - 0.5);
        const mains = shuffled.slice(0, count);
        // add cooldown
        const cool = { name: 'Cooldown & stretch', meta: '5-8 min' };
        plan[i].exercises = [warm].concat(mains).concat([cool]);
      }

      // Build textual output
      const metaText = `Target: ${rawMus.trim()} • Equipment: ${rawEquip.trim() || 'None'} • Weekly min: ${hours} hrs • Sessions: ${sessions}`;
      metaEl.textContent = metaText;

      // Render HTML in routineArea
      routineArea.innerHTML = '';
      plan.forEach((s, idx) => {
        const div = document.createElement('div');
        div.className = 'session';
        const h = document.createElement('h3');
        h.textContent = `Session ${idx + 1} — ${s.day}`;
        div.appendChild(h);
        const items = document.createElement('div');
        items.className = 'items';
        s.exercises.forEach(ex => {
          const eDiv = document.createElement('div');
          eDiv.className = 'ex';
          const left = document.createElement('div');
          left.innerHTML = `<div class="name">${ex.name}</div>`;
          const right = document.createElement('div');
          right.className = 'meta';
          right.textContent = ex.meta || '';
          eDiv.appendChild(left);
          eDiv.appendChild(right);
          items.appendChild(eDiv);
        });
        div.appendChild(items);

        // Add small session tip
        const tips = document.createElement('div');
        tips.className = 'tips';
        tips.textContent = 'Tip: Adjust sets/reps based on fatigue. Aim to progress either by reps, sets, or slightly more load each week.';
        div.appendChild(tips);

        routineArea.appendChild(div);
      });

      // Add overall footer note
      const footer = document.createElement('div');
      footer.style.marginTop = '8px';
      footer.style.fontSize = '13px';
      footer.style.color = 'var(--muted)';
      footer.textContent = 'Progression idea: each week add 1–2 reps per set or one extra set to an exercise. Rest 48h between similar sessions.';
      routineArea.appendChild(footer);

      // smooth scroll to top of output
      routineArea.parentElement.scrollIntoView({ behavior: 'smooth' });
    }

    // Copy routine as plain text
    function copyRoutine() {
      let text = metaEl.textContent + '\n\n';
      const sessions = routineArea.querySelectorAll('.session');
      sessions.forEach((s, idx) => {
        const h = s.querySelector('h3').textContent;
        text += h + '\n';
        s.querySelectorAll('.ex').forEach(e => {
          const name = e.querySelector('.name').textContent;
          const meta = e.querySelector('.meta').textContent;
          text += ` - ${name} — ${meta}\n`;
        });
        text += '\n';
      });
      navigator.clipboard && navigator.clipboard.writeText ? navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy as Text', 1200);
      }).catch(() => {
        alert('Copy failed — your browser may block clipboard access.');
      }) : alert('Clipboard not available.');
    }

    // Reset inputs to defaults
    function resetInputs() {
      muscleEl.value = 'Full body';
      equipEl.value = 'None';
      hoursEl.value = '2';
      metaEl.textContent = 'Fill inputs and click "Generate Routine".';
      routineArea.innerHTML = '<div style="color:var(--muted);">No routine generated yet.</div>';
    }

    // Events
    genBtn.addEventListener('click', generateRoutine);
    copyBtn.addEventListener('click', copyRoutine);
    resetBtn.addEventListener('click', resetInputs);

    // allow Enter to generate when focused on hours
    hoursEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { generateRoutine(); } });

    // initial generation
    generateRoutine();
  })();
</script>
